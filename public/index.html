<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot UASD | Estatuto Orgánico</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <span class="badge">Proyecto Final</span>
        <h1>Chatbot Inteligente UASD</h1>
        <p>Consulta el Estatuto Orgánico de la Universidad Autónoma de Santo Domingo.</p>
      </div>
      <div class="status-card">
        <span id="statusDot" class="dot"></span>
        <p id="statusText">Verificando documento...</p>
      </div>
    </section>

    <section class="layout">
      <aside class="suggestions">
        <h2>Preguntas sugeridas</h2>
        <div id="questionsList" class="questions-list"></div>
      </aside>

      <section class="chat-panel">
        <div id="chatBox" class="chat-box">
          <div class="message bot">
            <strong>Chatbot UASD</strong>
            <p>Hola. Escribe una pregunta sobre el Estatuto Orgánico de la UASD o selecciona una pregunta sugerida.</p>
          </div>
        </div>

        <form id="chatForm" class="chat-form">
          <input id="messageInput" type="text" placeholder="Ejemplo: ¿Cuáles son los derechos de los estudiantes?" autocomplete="off" />
          <button type="submit">Enviar</button>
        </form>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
